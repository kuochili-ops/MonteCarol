<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六蒙地卡羅接龍</title>
    <style>
        :root {
            --bg-color: #1a472a;
            --card-w: calc((100vw - 70px) / 5); 
            --card-h: calc(var(--card-w) * 1.4);
            --gap: 8px;
            --base-url: 'https://raw.githubusercontent.com/kuochili-ops/xcards/refs/heads/master/svg';
        }
        @media (min-width: 500px) { :root { --card-w: 75px; --card-h: 105px; --gap: 10px; } }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #2e7d32, #1a472a);
            color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .header { text-align: center; margin-bottom: 10px; width: 100%; z-index: 100; }
        .header h1 { margin: 5px 0; color: #ffeb3b; font-size: 1.4rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* 鎖定網格容器，防止任何晃動 */
        .grid-container {
            position: relative;
            width: calc(5 * var(--card-w) + 4 * var(--gap));
            height: calc(5 * var(--card-h) + 4 * var(--gap));
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .card {
            position: absolute; /* 使用絕對定位實現無感位移 */
            width: var(--card-w);
            height: var(--card-h);
            cursor: pointer;
            transition: transform 0.5s ease-in-out, opacity 0.3s;
            z-index: 2;
        }
        
        .card img {
            width: 100%; height: 100%; border-radius: 6px; display: block;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5); background: white; pointer-events: none;
        }
        
        /* 選取時只增加 Z-index 與微幅位移，不影響佈局 */
        .card.selected { z-index: 50; filter: brightness(1.1) drop-shadow(0 0 8px #ffeb3b); transform: scale(1.05); }
        
        .card.hint-flash { animation: hint-glow 0.6s ease-in-out infinite alternate; z-index: 40; }
        @keyframes hint-glow {
            from { box-shadow: 0 0 5px #ffeb3b; outline: 2px solid #ffeb3b; }
            to { box-shadow: 0 0 20px #ffeb3b; outline: 4px solid #fff; }
        }

        .card.match-flash { animation: flash-out 0.5s ease-out forwards; z-index: 100; }
        @keyframes flash-out {
            0% { transform: scale(1.05) translate(0,0); filter: brightness(2.5); }
            100% { transform: scale(0) translate(0,0); opacity: 0; }
        }

        .controls { margin-top: 20px; display: flex; gap: 12px; z-index: 100; }
        
        button {
            padding: 12px 24px; border: none; border-radius: 25px;
            background: #ffeb3b; color: #1b5e20; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #c6a700; font-size: 0.95rem;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c6a700; }
        button.repack-btn { background: #03a9f4; color: white; box-shadow: 0 4px 0 #0288d1; }

        .toast {
            position: fixed; top: 15%; background: rgba(0,0,0,0.85);
            padding: 12px 28px; border-radius: 30px; color: #ffeb3b;
            font-weight: bold; opacity: 0; transition: opacity 0.3s; 
            z-index: 2000; border: 2px solid #ffeb3b; pointer-events: none;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>𓃥 白六蒙地卡羅接龍</h1>
        <div style="font-size: 0.9rem;">
            牌堆: <span id="deck-cnt">--</span> | 分數: <span id="score-cnt">0</span>
        </div>
    </div>

    <div class="grid-container" id="game-grid"></div>
    
    <div id="msg-toast" class="toast"></div>

    <div class="controls">
        <button class="repack-btn" onclick="game.tryRepack()">重新排列 (Repack)</button>
        <button onclick="game.init()">新遊戲</button>
    </div>

    <div id="end-overlay" class="overlay">
        <h2 id="end-title" style="color: #ffeb3b; font-size: 2.5rem; margin-bottom: 10px;"></h2>
        <p style="font-size: 1.4rem;">最終得分：<span id="final-score">0</span></p>
        <button onclick="game.init()" style="margin-top: 30px; padding: 15px 40px;">再玩一次</button>
    </div>

    <script>
        const SUITS = ['H', 'D', 'C', 'S'];
        const RANKS = ['A', '2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K'];

        class MonteCarlo {
            constructor() {
                this.gridEl = document.getElementById('game-grid');
                this.baseUrl = 'https://raw.githubusercontent.com/kuochili-ops/xcards/refs/heads/master/svg';
                this.isAnimating = false;
                this.cardMap = new Map(); // 用於管理 DOM 節點，避免頻繁渲染
                this.init();
            }

            init() {
                if (this.isAnimating) return;
                document.getElementById('end-overlay').style.display = 'none';
                this.gridEl.innerHTML = '';
                this.cardMap.clear();
                
                this.deck = [];
                SUITS.forEach(s => RANKS.forEach(r => this.deck.push({ r, s, id: Math.random().toString(36).substr(2, 9) })));
                this.shuffle(this.deck);
                
                this.table = this.deck.splice(0, 25);
                this.score = 0;
                this.selectedIdx = null;
                
                this.setupInitialGrid();
                this.updateUI();
                this.checkGameState();
            }

            shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }

            // 計算絕對定位座標
            getPos(idx) {
                const r = Math.floor(idx / 5);
                const c = idx % 5;
                const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap'));
                const w = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
                const h = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
                return {
                    x: 10 + c * (w + gap),
                    y: 10 + r * (h + gap)
                };
            }

            setupInitialGrid() {
                this.table.forEach((card, i) => {
                    if (card) this.createCardDOM(card, i);
                });
            }

            createCardDOM(card, idx) {
                const el = document.createElement('div');
                el.className = 'card';
                el.id = `card-${card.id}`;
                const pos = this.getPos(idx);
                el.style.left = `${pos.x}px`;
                el.style.top = `${pos.y}px`;
                
                const img = document.createElement('img');
                img.src = `${this.baseUrl}/face/${card.r}${card.s}.svg`;
                el.appendChild(img);
                
                el.onclick = () => this.handleClick(idx);
                this.gridEl.appendChild(el);
                this.cardMap.set(card.id, el);
                return el;
            }

            updateUI() {
                document.getElementById('deck-cnt').innerText = this.deck.length;
                document.getElementById('score-cnt').innerText = this.score;
            }

            async handleClick(i) {
                if (this.isAnimating || !this.table[i]) return;
                this.clearHints();

                const currentCard = this.table[i];
                const currentEl = this.cardMap.get(currentCard.id);

                if (this.selectedIdx === null) {
                    this.selectedIdx = i;
                    currentEl.classList.add('selected');
                } else if (this.selectedIdx === i) {
                    this.selectedIdx = null;
                    currentEl.classList.remove('selected');
                } else {
                    const idx1 = this.selectedIdx;
                    const card1 = this.table[idx1];
                    const el1 = this.cardMap.get(card1.id);
                    
                    if (card1.r === currentCard.r && this.isAdjacent(idx1, i)) {
                        this.isAnimating = true;
                        el1.classList.remove('selected');
                        el1.classList.add('match-flash');
                        currentEl.classList.add('match-flash');
                        
                        await new Promise(r => setTimeout(r, 500));
                        
                        el1.remove();
                        currentEl.remove();
                        this.cardMap.delete(card1.id);
                        this.cardMap.delete(currentCard.id);
                        
                        this.table[idx1] = null;
                        this.table[i] = null;
                        this.score += 10;
                        this.selectedIdx = null;
                        this.isAnimating = false;
                        this.updateUI();
                        this.checkGameState();
                    } else {
                        el1.classList.remove('selected');
                        this.selectedIdx = i;
                        currentEl.classList.add('selected');
                    }
                }
            }

            isAdjacent(i1, i2) {
                const r1 = Math.floor(i1 / 5), c1 = i1 % 5;
                const r2 = Math.floor(i2 / 5), c2 = i2 % 5;
                return Math.abs(r1 - r2) <= 1 && Math.abs(c1 - c2) <= 1;
            }

            findMatch() {
                for (let i = 0; i < 25; i++) {
                    if (!this.table[i]) continue;
                    for (let j = i + 1; j < 25; j++) {
                        if (this.table[j] && this.table[i].r === this.table[j].r && this.isAdjacent(i, j)) return [i, j];
                    }
                }
                return null;
            }

            clearHints() {
                this.cardMap.forEach(el => el.classList.remove('hint-flash'));
            }

            tryRepack() {
                if (this.isAnimating) return;
                const match = this.findMatch();
                if (match) {
                    this.showToast("尚有配對牌可消除");
                    this.cardMap.get(this.table[match[0]].id).classList.add('hint-flash');
                    this.cardMap.get(this.table[match[1]].id).classList.add('hint-flash');
                } else {
                    const emptyCount = this.table.filter(c => c === null).length;
                    if (emptyCount > 0) this.repack();
                    else this.checkGameState();
                }
            }

            async repack() {
                this.isAnimating = true;
                this.selectedIdx = null;
                this.cardMap.forEach(el => el.classList.remove('selected'));

                // 1. 收攏：計算新位置並移動
                let remainingCards = this.table.filter(c => c !== null);
                let newTable = [...remainingCards, ...Array(25 - remainingCards.length).fill(null)];
                
                remainingCards.forEach((card, newIdx) => {
                    const el = this.cardMap.get(card.id);
                    const pos = this.getPos(newIdx);
                    el.style.left = `${pos.x}px`;
                    el.style.top = `${pos.y}px`;
                    el.onclick = () => this.handleClick(newIdx); // 更新點擊索引
                });

                await new Promise(r => setTimeout(r, 550));
                this.table = newTable;

                // 2. 補牌
                if (this.deck.length > 0) {
                    for (let i = remainingCards.length; i < 25; i++) {
                        if (this.deck.length === 0) break;
                        const newCard = this.deck.shift();
                        this.table[i] = newCard;
                        const el = this.createCardDOM(newCard, i);
                        el.style.opacity = '0';
                        el.style.transform = 'scale(0.5)';
                        setTimeout(() => {
                            el.style.opacity = '1';
                            el.style.transform = 'scale(1)';
                        }, 50);
                        this.updateUI();
                        await new Promise(r => setTimeout(r, 100));
                    }
                }
                
                this.isAnimating = false;
                this.checkGameState();
            }

            checkGameState() {
                const match = this.findMatch();
                const cardCount = this.table.filter(c => c).length;
                const isRepacked = this.isTableRepacked();

                if (cardCount === 0 && this.deck.length === 0) {
                    this.endGame("恭喜！全配對消除", true);
                    return;
                }

                if (!match) {
                    if (this.deck.length === 0 && isRepacked) {
                        this.endGame("遊戲結束", false);
                    } else if (this.deck.length === 0 && !isRepacked) {
                        this.showToast("無配對牌，請按排列收攏剩餘卡片");
                    } else if (this.deck.length > 0 && cardCount === 25) {
                        this.endGame("遊戲結束", false);
                    } else {
                        this.showToast("無配對牌，請重新排列");
                    }
                }
            }

            isTableRepacked() {
                let foundNull = false;
                for (let i = 0; i < 25; i++) {
                    if (this.table[i] === null) foundNull = true;
                    else if (foundNull) return false;
                }
                return true;
            }

            showToast(msg) {
                const t = document.getElementById('msg-toast');
                t.innerText = msg; t.style.opacity = '1';
                setTimeout(() => t.style.opacity = '0', 2500);
            }

            endGame(title, win) {
                document.getElementById('end-title').innerText = title;
                document.getElementById('end-title').style.color = win ? "#4caf50" : "#ffeb3b";
                document.getElementById('final-score').innerText = this.score;
                document.getElementById('end-overlay').style.display = 'flex';
            }
        }
        const game = new MonteCarlo();
    </script>
</body>
</html>
