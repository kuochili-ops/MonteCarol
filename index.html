<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六蒙地卡羅接龍</title>
    <style>
        :root {
            --bg-color: #1a472a;
            --card-w: 70px;
            --card-h: 98px;
            --gap: 8px;
            /* 調整容器內部邊距，給予兩側更多呼吸空間 */
            --container-padding: 16px;
            --base-url: 'https://raw.githubusercontent.com/kuochili-ops/xcards/refs/heads/master/svg';
        }
        @media (min-width: 500px) { 
            :root { --card-w: 80px; --card-h: 112px; --gap: 12px; --container-padding: 20px; } 
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #2e7d32, #1a472a);
            color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; min-height: 100vh; overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .header { text-align: center; margin-bottom: 8px; width: 100%; height: 60px; }
        .header h1 { margin: 2px 0; color: #ffeb3b; font-size: 1.3rem; }

        .grid-container {
            position: relative;
            /* 讓桌面水平置中 */
            margin: 0 auto;
            width: calc(5 * var(--card-w) + 4 * var(--gap) + 2 * var(--container-padding));
            height: calc(5 * var(--card-h) + 4 * var(--gap) + 2 * var(--container-padding));
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        .card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
            will-change: transform;
            z-index: 2;
            /* 基準點位於內邊距位置 */
            left: var(--container-padding);
            top: var(--container-padding);
        }
        
        .card img {
            width: 100%; height: 100%; border-radius: 6px; display: block;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4); background: white; pointer-events: none;
        }
        
        /* 選取標記：原地外框反閃 */
        .card.selected { z-index: 50; }
        .card.selected img {
            outline: 3px solid #ffeb3b;
            box-shadow: 0 0 15px #ffeb3b, 0 0 30px #ffeb3b;
            animation: selected-blink 0.8s infinite alternate;
        }
        @keyframes selected-blink {
            from { filter: brightness(1); }
            to { filter: brightness(1.3); }
        }

        /* 提醒方式 */
        .card.hint-flash { z-index: 40; }
        .card.hint-flash img {
            animation: hint-glow 0.6s ease-in-out infinite alternate;
        }
        @keyframes hint-glow {
            from { outline: 2px solid #ffeb3b; box-shadow: 0 0 5px #ffeb3b; }
            to { outline: 4px solid #ffffff; box-shadow: 0 0 20px #ffeb3b; }
        }

        .card.match-flash {
            animation: flash-out 0.4s ease-out forwards;
            z-index: 100;
        }
        @keyframes flash-out {
            0% { opacity: 1; filter: brightness(2.5); }
            100% { opacity: 0; transform: scale(0.2); }
        }

        .controls { margin-top: 20px; display: flex; gap: 12px; }
        button {
            padding: 10px 24px; border: none; border-radius: 25px;
            background: #ffeb3b; color: #1b5e20; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #c6a700; font-size: 1rem;
            transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c6a700; }
        button.repack-btn { background: #03a9f4; color: white; box-shadow: 0 4px 0 #0288d1; }
        button.repack-btn:active { box-shadow: 0 2px 0 #0288d1; }

        .toast {
            position: fixed; top: 15%; background: rgba(0,0,0,0.9);
            padding: 10px 20px; border-radius: 20px; color: #ffeb3b;
            opacity: 0; transition: opacity 0.3s; z-index: 2000; border: 1px solid #ffeb3b;
            pointer-events: none;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>𓃥 白六蒙地卡羅接龍</h1>
        <div style="font-size: 0.9rem;">
            牌堆: <span id="deck-cnt">--</span> | 分數: <span id="score-cnt">0</span>
        </div>
    </div>

    <div class="grid-container" id="game-grid"></div>
    <div id="msg-toast" class="toast"></div>

    <div class="controls">
        <button class="repack-btn" onclick="game.tryRepack()">重新排列 (Repack)</button>
        <button onclick="game.init()">新遊戲</button>
    </div>

    <div id="end-overlay" class="overlay">
        <h2 id="end-title" style="color: #ffeb3b; font-size: 2.2rem; margin-bottom: 10px; text-align: center;"></h2>
        <p style="font-size: 1.4rem;">最終得分：<span id="final-score">0</span></p>
        <button onclick="game.init()" style="margin-top: 30px;">再玩一次</button>
    </div>

    <script>
        class MonteCarlo {
            constructor() {
                this.gridEl = document.getElementById('game-grid');
                this.baseUrl = 'https://raw.githubusercontent.com/kuochili-ops/xcards/refs/heads/master/svg';
                this.isAnimating = false;
                this.cardMap = new Map();
                this.init();
            }

            init() {
                if (this.isAnimating) return;
                document.getElementById('end-overlay').style.display = 'none';
                this.gridEl.innerHTML = '';
                this.cardMap.clear();
                this.deck = [];
                ['H','D','C','S'].forEach(s => ['A','2','3','4','5','6','7','8','9','T','J','Q','K'].forEach(r => {
                    this.deck.push({ r, s, id: Math.random().toString(36).substr(2, 9) });
                }));
                this.shuffle(this.deck);
                this.table = this.deck.splice(0, 25);
                this.score = 0;
                this.selectedIdx = null;
                this.table.forEach((card, i) => { if (card) this.createCardDOM(card, i); });
                this.updateUI();
                this.checkGameState();
            }

            shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }

            getPos(idx) {
                const style = getComputedStyle(document.documentElement);
                const w = parseFloat(style.getPropertyValue('--card-w'));
                const h = parseFloat(style.getPropertyValue('--card-h'));
                const g = parseFloat(style.getPropertyValue('--gap'));
                const r = Math.floor(idx / 5);
                const c = idx % 5;
                return {
                    x: c * (w + g),
                    y: r * (h + g)
                };
            }

            createCardDOM(card, idx) {
                const el = document.createElement('div');
                el.className = 'card';
                const pos = this.getPos(idx);
                el.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;
                
                const img = document.createElement('img');
                img.src = `${this.baseUrl}/face/${card.r}${card.s}.svg`;
                el.appendChild(img);
                
                el.onclick = () => this.handleClick(idx);
                this.gridEl.appendChild(el);
                this.cardMap.set(card.id, el);
                return el;
            }

            updateUI() {
                document.getElementById('deck-cnt').innerText = this.deck.length;
                document.getElementById('score-cnt').innerText = this.score;
            }

            async handleClick(i) {
                if (this.isAnimating || !this.table[i]) return;
                this.cardMap.forEach(el => el.classList.remove('hint-flash'));
                
                const card = this.table[i];
                const el = this.cardMap.get(card.id);

                if (this.selectedIdx === null) {
                    this.selectedIdx = i;
                    el.classList.add('selected');
                } else if (this.selectedIdx === i) {
                    this.selectedIdx = null;
                    el.classList.remove('selected');
                } else {
                    const idx1 = this.selectedIdx;
                    const card1 = this.table[idx1];
                    const el1 = this.cardMap.get(card1.id);
                    
                    if (card1.r === card.r && this.isAdjacent(idx1, i)) {
                        this.isAnimating = true;
                        el1.classList.remove('selected');
                        el1.classList.add('match-flash');
                        el.classList.add('match-flash');
                        
                        await new Promise(r => setTimeout(r, 400));
                        el1.remove(); el.remove();
                        this.cardMap.delete(card1.id);
                        this.cardMap.delete(card.id);
                        this.table[idx1] = this.table[i] = null;
                        this.score += 10;
                        this.selectedIdx = null;
                        this.isAnimating = false;
                        this.updateUI();
                        this.checkGameState();
                    } else {
                        el1.classList.remove('selected');
                        this.selectedIdx = i;
                        el.classList.add('selected');
                    }
                }
            }

            isAdjacent(i1, i2) {
                const r1 = Math.floor(i1 / 5), c1 = i1 % 5;
                const r2 = Math.floor(i2 / 5), c2 = i2 % 5;
                return Math.abs(r1 - r2) <= 1 && Math.abs(c1 - c2) <= 1;
            }

            tryRepack() {
                if (this.isAnimating) return;
                const match = this.findMatch();
                if (match) {
                    this.showToast("尚有配對牌可消除");
                    this.cardMap.get(this.table[match[0]].id).classList.add('hint-flash');
                    this.cardMap.get(this.table[match[1]].id).classList.add('hint-flash');
                } else {
                    this.repack();
                }
            }

            async repack() {
                this.isAnimating = true;
                this.selectedIdx = null;
                this.cardMap.forEach(el => el.classList.remove('selected', 'hint-flash'));

                let remaining = this.table.filter(c => c !== null);
                remaining.forEach((card, newIdx) => {
                    const el = this.cardMap.get(card.id);
                    const pos = this.getPos(newIdx);
                    el.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;
                    el.onclick = () => this.handleClick(newIdx);
                });

                await new Promise(r => setTimeout(r, 450));
                this.table = [...remaining, ...Array(25 - remaining.length).fill(null)];

                if (this.deck.length > 0) {
                    for (let i = remaining.length; i < 25; i++) {
                        if (this.deck.length === 0) break;
                        const newCard = this.deck.shift();
                        this.table[i] = newCard;
                        const el = this.createCardDOM(newCard, i);
                        el.style.opacity = '0';
                        requestAnimationFrame(() => { el.style.opacity = '1'; });
                        this.updateUI();
                        await new Promise(r => setTimeout(r, 80));
                    }
                }
                this.isAnimating = false;
                this.checkGameState();
            }

            findMatch() {
                for (let i = 0; i < 25; i++) {
                    if (!this.table[i]) continue;
                    for (let j = i + 1; j < 25; j++) {
                        if (this.table[j] && this.table[i].r === this.table[j].r && this.isAdjacent(i, j)) return [i, j];
                    }
                }
                return null;
            }

            checkGameState() {
                const match = this.findMatch();
                const cardCount = this.table.filter(c => c).length;
                
                if (cardCount === 0 && this.deck.length === 0) {
                    this.endGame("🎉 完美消除！勝利！", true);
                    return;
                }

                if (!match) {
                    const isRepacked = this.table.every((c, i) => i < cardCount ? c !== null : c === null);
                    if (this.deck.length === 0 && isRepacked) {
                        this.endGame("遊戲結束（無配對）", false);
                    } else if (this.deck.length === 0 && !isRepacked) {
                        this.showToast("請點擊排列收攏剩餘卡片");
                    } else if (this.deck.length > 0 && cardCount === 25) {
                        this.endGame("遊戲結束（牌面已滿）", false);
                    } else {
                        this.showToast("無配對牌，請按排列補牌");
                    }
                }
            }

            showToast(msg) {
                const t = document.getElementById('msg-toast');
                t.innerText = msg; t.style.opacity = '1';
                setTimeout(() => t.style.opacity = '0', 2500);
            }

            endGame(title, win) {
                document.getElementById('end-title').innerText = title;
                document.getElementById('final-score').innerText = this.score;
                document.getElementById('end-overlay').style.display = 'flex';
            }
        }
        const game = new MonteCarlo();
    </script>
</body>
</html>
